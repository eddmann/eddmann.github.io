secret_santa:
  - name: Secret Santa
    description: A yearly tradition of over-engineering Secret Santa - a new implementation every Christmas since 2020.
    url: https://github.com/eddmann/secret-santa-draw-arcade
    tags: [Clojure, Python, Java, TypeScript, PHP, Swift, C]
    children:
      - name: "2025 - Arcade & Game Boy"
        description: Retro arcade mini-games (Phaser.js) and a Game Boy Color cartridge (GBDK-2020).
        url: https://eddmann.com/secret-santa-draw-arcade/
      - name: "2024 - Web & iOS App"
        description: PHP web app and native Swift iOS app with exclusion rules and festive animations.
        url: https://secret-santa.eddmann.com/
      - name: "2023 - PWA"
        description: React/Vite Progressive Web App for local and remote draws.
        url: https://github.com/eddmann/secret-santa-pwa
      - name: "2022 - Step Functions"
        description: AWS Step Function workflow using every available Lambda runtime.
        url: https://github.com/eddmann/step-function-secret-santa
      - name: "2021 - Raspberry Pi Pico"
        description: MicroPython allocator that sends results via SMS using a SIM800L module.
        url: https://github.com/eddmann/pico-secret-santa
      - name: "2020 - Clojure"
        description: Allocates and emails Secret Santas via Gmail.
        url: https://github.com/eddmann/clojure-secret-santa

experiments:
  - name: phpboy
    description: Game Boy Color emulator written in PHP 8.4 with full DMG backward compatibility, 100% Blargg pass rate, and CLI/WASM frontends.
    url: https://github.com/eddmann/phpboy
    tags: [PHP, WebAssembly]

  - name: 3x3x3 Rubik's Cube Solver
    description: Algorithmic Rubik's Cube solver with 3D visualisation using Rust/WASM and React/Three.js.
    url: https://eddmann.com/rubik-cube-solver/
    tags: [Rust, WebAssembly, React, Three.js]

  - name: c3
    description: Educational chess engine with magic bitboards, iterative deepening, alpha-beta pruning, transposition tables, and UCI protocol.
    url: https://github.com/eddmann/c3
    tags: [C++]

  - name: "Pok\xE9Health"
    description: "Pok\xE9mon Red meets Apple HealthKit - a browser-based Game Boy emulator where real-world steps, sleep, calories, and workouts modify gameplay."
    url: https://github.com/eddmann/pokehealth
    tags: [TypeScript, React, WebAssembly]

  - name: phpx
    description: Run PHP scripts with inline dependencies. Execute Composer tools without global installation. Like npx/uvx for PHP.
    url: https://eddmann.com/phpx/
    tags: [Go, PHP]

  - name: buns
    description: Run TypeScript/JavaScript with inline npm dependencies - no package.json needed. Automatic Bun version management.
    url: https://eddmann.com/buns/
    tags: [Go, TypeScript]

  - name: Our Wedding Website
    description: Wedding RSVP website built with DDD, CQRS, Hexagonal Architecture, Event Sourcing, and deployed on Lambda.
    url: https://github.com/eddmann/our-wedding-website
    tags: [PHP, AWS Lambda]
