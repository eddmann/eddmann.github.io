languages:
  - name: santa-lang
    description: A functional, C-like programming language designed for solving Advent of Code puzzles. Includes multiple compiler and interpreter backends, a code formatter, web editor, and desktop IDE.
    url: https://eddmann.com/santa-lang/
    tags: [Rust, TypeScript, Kotlin, Zig, C]
    children:
      - name: Comet
        description: Rust tree-walking interpreter with CLI, WASM, Lambda, PHP, and Jupyter runtimes.
        url: https://eddmann.com/santa-lang/reindeer/comet/
      - name: Blitzen
        description: Rust bytecode VM compiling to FrostByte for optimised puzzle solving.
        url: https://eddmann.com/santa-lang/reindeer/blitzen/
      - name: Dasher
        description: Rust LLVM-based AOT native compiler to optimised machine code.
        url: https://eddmann.com/santa-lang/reindeer/dasher/
      - name: Prancer
        description: TypeScript tree-walking interpreter with CLI, Web, and Lambda runtimes.
        url: https://eddmann.com/santa-lang/reindeer/prancer/
      - name: Donner
        description: Kotlin compiler generating optimised JVM bytecode via ASM.
        url: https://eddmann.com/santa-lang/reindeer/donner/
      - name: Tinsel
        description: Opinionated code formatter with CLI and WebAssembly runtimes, written in Zig.
        url: https://eddmann.com/santa-lang/formatter/
      - name: Workbench
        description: Cross-platform desktop IDE with multi-reindeer execution and benchmarking.
        url: https://eddmann.com/santa-lang/workbench/
      - name: Editor
        description: Web-based code editor with live execution and interactive development.
        url: https://eddmann.com/santa-lang-editor/
      - name: Workshop
        description: LLM elves craft and test santa-lang implementations across languages.
        url: https://eddmann.com/santa-lang-workshop/

